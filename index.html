<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sneaker Store | Catálogo Completo</title>
    <style>
        :root {
            --bg-principal: #0b0b0d;
            --bg-tarjeta: #16161a;
            --acento: #ff5e00; 
            --texto-blanco: #ffffff;
            --texto-gris: #94a3b8;
            --whatsapp-color: #25d366;
            --borde: #27272a;
            --oro-premium: #ffd700;
            --bg-premium: #0f0f12;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-principal);
            color: var(--texto-blanco);
            padding-bottom: 40px;
            overflow-x: hidden;
        }

        header {
            position: relative;
            padding: 30px 5%;
            background: linear-gradient(180deg, rgba(255, 94, 0, 0.08) 0%, rgba(11, 11, 13, 0) 100%);
            border-bottom: 1px solid var(--borde);
            margin-bottom: 30px;
            display: flex;
            align-items: center;
        }

        header h1 {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -1px;
            text-transform: uppercase;
        }

        header h1 span {
            color: var(--acento);
        }

        .btn-premium-top {
            position: absolute;
            right: 5%;
            top: 50%;
            transform: translateY(-50%);
            background: linear-gradient(135deg, #ffe600 0%, #ff5e00 100%);
            color: #000000;
            border: none;
            padding: 10px 18px;
            border-radius: 20px;
            font-weight: 800;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255, 94, 0, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
            z-index: 10;
        }

        .btn-premium-top:hover {
            transform: translateY(-50%) scale(1.03);
            box-shadow: 0 0 20px rgba(255, 230, 0, 0.5);
        }

        /* MODAL VIP */
        .modal-vip {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(11, 11, 13, 0.96);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 9999;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }

        .modal-vip.activo {
            display: flex;
        }

        .contenido-vip {
            width: 100%;
            max-width: 1100px;
            height: 85vh;
            background-color: var(--bg-premium);
            border: 1px solid rgba(255, 215, 0, 0.25);
            border-radius: 24px;
            padding: 35px 25px;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.1);
        }

        .btn-cerrar-vip {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: var(--texto-gris);
            font-size: 2rem;
            cursor: pointer;
            z-index: 100;
        }

        .btn-cerrar-vip:hover {
            color: var(--oro-premium);
        }

        .encabezado-vip {
            text-align: center;
            margin-bottom: 35px;
        }

        .encabezado-vip h2 {
            font-size: 2rem;
            font-weight: 900;
            letter-spacing: 2px;
            background: linear-gradient(90deg, #fff 0%, var(--oro-premium) 50%, #fff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .grid-premium {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        /* 🚀 ANIMACIÓN INTEGRADA DIRECTAMENTE AQUÍ PARA LAS TARJETAS */
        @keyframes aparecerTarjeta {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .tarjeta-premium {
            background: linear-gradient(145deg, #1a1a22, #111115);
            border-radius: 20px;
            border: 1px solid rgba(255, 215, 0, 0.08);
            padding: 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
            animation: aparecerTarjeta 0.4s ease-out forwards;
            transition: border-color 0.3s, transform 0.3s;
        }

        .tarjeta-premium:hover {
            border-color: var(--oro-premium);
            transform: translateY(-4px);
        }

        .img-vip-container {
            width: 100%;
            height: 200px;
            background: radial-gradient(circle, #22222b 0%, #111115 100%);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
        }

        .img-vip-container img {
            width: 85%;
            height: 85%;
            object-fit: contain;
        }

        .badge-vip {
            position: absolute;
            top: 15px;
            left: 15px;
            background: linear-gradient(90deg, #000, #b59410);
            border: 1px solid var(--oro-premium);
            color: var(--oro-premium);
            font-size: 0.7rem;
            font-weight: 800;
            padding: 5px 10px;
            border-radius: 6px;
            text-transform: uppercase;
        }

        .precio-vip {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--oro-premium);
            margin: 12px 0;
        }

        .btn-pedido-vip {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            background: linear-gradient(90deg, #b59410, #ffe600);
            color: #000;
            text-decoration: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: 800;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        /* FILTROS Y BUSCADOR */
        .seccion-filtros {
            max-width: 600px;
            margin: 0 auto 30px auto;
            padding: 0 20px;
        }

        .caja-busqueda {
            width: 100%;
            padding: 14px 20px;
            background-color: var(--bg-tarjeta);
            border: 1px solid var(--borde);
            border-radius: 12px;
            color: var(--texto-blanco);
            font-size: 1rem;
            outline: none;
            margin-bottom: 15px;
        }

        .caja-busqueda:focus {
            border-color: var(--acento);
        }

        .grupo-botones {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 5px;
        }

        .grupo-botones::-webkit-scrollbar {
            display: none;
        }

        .btn-filtro {
            background-color: var(--bg-tarjeta);
            color: var(--texto-gris);
            border: 1px solid var(--borde);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .btn-filtro.activo, .btn-filtro:hover {
            background-color: var(--acento);
            color: var(--texto-blanco);
            border-color: var(--acento);
        }

        /* CATÁLOGO PRINCIPAL */
        .contenedor-catalogo {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }

        .tarjeta-tenis {
            background-color: var(--bg-tarjeta);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--borde);
            animation: aparecerTarjeta 0.4s ease-out forwards; /* 👈 Animación aquí */
            transition: transform 0.2s, border-color 0.2s;
        }

        .tarjeta-tenis:hover {
            transform: translateY(-4px);
            border-color: var(--acento);
        }

        .imagen-contenedor {
            width: 100%;
            height: 240px;
            background-color: #1f1f24;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .imagen-contenedor img {
            width: 90%;
            height: 90%;
            object-fit: contain;
        }

        .etiqueta-calidad {
            position: absolute;
            top: 12px;
            left: 12px;
            background-color: var(--acento);
            color: white;
            font-size: 0.75rem;
            font-weight: 700;
            padding: 4px 8px;
            border-radius: 6px;
            text-transform: uppercase;
        }

        .detalles-producto {
            padding: 20px;
        }

        .marca {
            font-size: 0.8rem;
            text-transform: uppercase;
            color: var(--texto-gris);
            margin-bottom: 4px;
        }

        .nombre-modelo {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 8px;
            height: 2.6em;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .precio {
            font-size: 1.4rem;
            font-weight: 800;
            margin-bottom: 16px;
        }

        .btn-pedido {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            background-color: var(--whatsapp-color);
            color: white;
            text-decoration: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: 700;
        }

        .btn-pedido svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        .info-entregas {
            text-align: center;
            margin-top: 40px;
            color: var(--texto-gris);
            font-size: 0.85rem;
        }

        @media (max-width: 520px) {
            header {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
                padding: 20px 4%;
            }
            .btn-premium-top {
                position: static;
                transform: none;
                align-self: flex-end;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Kicks <span>Catalog</span></h1>
        <button id="abrir-vip" class="btn-premium-top">💎 Premium Line</button>
    </header>

    <div id="modal-premium" class="modal-vip">
        <div class="contenido-vip">
            <button id="cerrar-vip" class="btn-cerrar-vip">&times;</button>
            <div class="encabezado-vip">
                <h2>💎 LUXURY SELECTION 💎</h2>
                <p>Marcas exclusivas de alta gama importadas con la máxima calidad.</p>
            </div>
            <div class="grid-premium" id="lista-premium"></div>
        </div>
    </div>

    <div class="seccion-filtros">
        <input type="text" id="buscador" class="caja-busqueda" placeholder="Buscar modelo o marca...">
        <div class="grupo-botones">
            <button class="btn-filtro activo" data-filtro="todos">Todos</button>
            <button class="btn-filtro" data-filtro="nike">Nike</button>
            <button class="btn-filtro" data-filtro="jordan">Jordan</button>
            <button class="btn-filtro" data-filtro="adidas">Adidas</button>
            <button class="btn-filtro" data-filtro="new balance">New Balance</button>
            <button class="btn-filtro" data-filtro="puma">Puma</button>
        </div>
    </div>

    <main class="contenedor-catalogo" id="lista-tenis"></main>

    <div class="info-entregas">
        <p>📦 Catálogo con buscador y filtros en tiempo real.</p>
    </div>

    <script>
        // Pone tu teléfono real aquí (Código de país + número, ej: 5281XXXXXXXX)
        const MI_WHATSAPP = "521234567890"; 
        
        // Imágenes temporales de muestra
        const IMG_TEMP = "https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=500";
        const IMG_LUXO_TEMP = "https://images.unsplash.com/photo-1595950653106-6c9ebd614d3a?q=80&w=500";

        const productosPremium = [
            { nombre: "Louis Vuitton Maxi Trainer Monogram", marca: "Louis Vuitton", precio: 3800, calidad: "Exclusivo", img: IMG_LUXO_TEMP },
            { nombre: "Louis Vuitton Skate Sneaker Black", marca: "Louis Vuitton", precio: 3900, calidad: "Exclusivo", img: IMG_LUXO_TEMP },
            { nombre: "Gucci Screener Leather Vintage", marca: "Gucci", precio: 3500, calidad: "Exclusivo", img: IMG_LUXO_TEMP }
        ];

        const productos = [
            // === JORDAN ===
            { nombre: "Travis Scott Low Black Phantom", marca: "jordan", precio: 1650, calidad: "Gama Alta", img: IMG_TEMP },
            { nombre: "Travis Scott Low Reverse Mocha", marca: "jordan", precio: 1650, calidad: "Gama Alta", img: IMG_TEMP },
            { nombre: "Jordan 4 Retro Black Cat", marca: "jordan", precio: 1500, calidad: "Gama Alta", img: IMG_TEMP },
            { nombre: "Jordan 1 Retro High Chicago", marca: "jordan", precio: 1400, calidad: "Gama Alta", img: IMG_TEMP },

            // === NIKE ===
            { nombre: "Air Force 1 Low Total White", marca: "nike", precio: 850, calidad: "1:1 Premium", img: IMG_TEMP },
            { nombre: "Dunk Low Panda", marca: "nike", precio: 950, calidad: "1:1 Premium", img: IMG_TEMP },
            { nombre: "Nike Shox TL Triple Black", marca: "nike", precio: 1350, calidad: "Gama Alta", img: IMG_TEMP },

            // === ADIDAS ===
            { nombre: "Adidas Campus 00s Core Black", marca: "adidas", precio: 900, calidad: "1:1 Premium", img: IMG_TEMP },
            { nombre: "Adidas Samba OG White Black", marca: "adidas", precio: 850, calidad: "1:1 Premium", img: IMG_TEMP },

            // === NEW BALANCE ===
            { nombre: "New Balance 9060 Rain Cloud", marca: "new balance", precio: 1450, calidad: "Gama Alta", img: IMG_TEMP }
        ];

        const contenedor = document.getElementById('lista-tenis');
        const buscador = document.getElementById('buscador');
        const botonesFiltro = document.querySelectorAll('.btn-filtro');
        const contenedorPremium = document.getElementById('lista-premium');

        let filtroMarcaActivo = 'todos';

        function renderarProductos() {
            contenedor.innerHTML = "";
            const textoBusqueda = buscador.value.toLowerCase().trim();

            productos.forEach(prod => {
                const coincideTexto = prod.nombre.toLowerCase().includes(textoBusqueda) || prod.marca.toLowerCase().includes(textoBusqueda);
                const coincideMarca = filtroMarcaActivo === 'todos' || prod.marca === filtroMarcaActivo;

                if (coincideTexto && coincideMarca) {
                    const card = document.createElement('div');
                    card.className = 'tarjeta-tenis';
                    card.innerHTML = `
                        <div class="imagen-contenedor">
                            <img src="${prod.img}" alt="${prod.nombre}">
                            <span class="etiqueta-calidad">${prod.calidad}</span>
                        </div>
                        <div class="detalles-producto">
                            <div class="marca">${prod.marca}</div>
                            <div class="nombre-modelo">${prod.nombre}</div>
                            <div class="precio">$${prod.precio} MXN</div>
                            <a href="https://wa.me/${MI_WHATSAPP}?text=%C2%A1Hola!%20Me%20interesa%20pedir%20los%20${encodeURIComponent(prod.nombre)}." target="_blank" class="btn-pedido">
                                <svg viewBox="0 0 24 24"><path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946C.06 5.348 5.397.01 12.008.01c3.202.001 6.212 1.246 8.477 3.514 2.266 2.268 3.507 5.28 3.505 8.484-.004 6.657-5.34 11.997-11.953 11.997-2.005-.001-3.973-.502-5.713-1.457L0 24zm6.59-4.846c1.66.986 3.292 1.479 5.342 1.48 5.432 0 9.851-4.42 9.855-9.852.002-2.631-1.025-5.102-2.892-6.971C17.036 1.94 14.568.916 11.956.916c-5.438 0-9.859 4.423-9.862 9.859-.001 2.09.547 3.65 1.495 5.225L2.664 21.64l5.983-1.567zM17.52 14.33c-.302-.15-1.786-.882-2.063-.982-.277-.1-.478-.15-.68.15-.202.3-.783 1-.96 1.2-.177.2-.355.225-.657.075-.302-.15-1.276-.47-2.43-1.499-.899-.8-1.504-1.79-1.681-2.09-.177-.3-.018-.462.133-.61.135-.134.302-.35.454-.525.151-.175.202-.3.302-.5.101-.2.05-.375-.025-.525-.075-.15-.68-1.642-.932-2.247-.247-.592-.497-.512-.68-.522-.177-.009-.38-.01-.583-.01-.202 0-.532.075-.81.375-.278.3-1.062 1.039-1.062 2.535 0 1.496 1.088 2.943 1.24 3.143.151.2 2.142 3.272 5.19 4.587.725.313 1.29.5 1.73.64.729.23 1.391.198 1.916.12.584-.087 1.786-.731 2.039-1.439.252-.708.252-1.313.177-1.439-.075-.125-.277-.2-.579-.35z"/></svg>
                                Pedir por WhatsApp
                            </a>
                        </div>
                    `;
                    contenedor.appendChild(card);
                }
            });
        }

        function renderarPremium() {
            contenedorPremium.innerHTML = "";
            productosPremium.forEach((prod) => {
                const card = document.createElement('div');
                card.className = 'tarjeta-premium';
                card.innerHTML = `
                    <span class="badge-vip">${prod.calidad}</span>
                    <div class="img-vip-container">
                        <img src="${prod.img}" alt="${prod.nombre}">
                    </div>
                    <div class="marca" style="color: var(--oro-premium); font-weight: 700;">${prod.marca}</div>
                    <div class="nombre-modelo" style="height: auto; margin-bottom: 5px;">${prod.nombre}</div>
                    <div class="precio-vip">$${prod.precio} MXN</div>
                    <a href="https://wa.me/${MI_WHATSAPP}?text=%C2%A1Hola!%20Me%20interesa%20el%20modelo%20VIP%20exclusivo:%20${encodeURIComponent(prod.nombre)}." target="_blank" class="btn-pedido-vip">
                        Adquirir Pieza VIP
                    </a>
                `;
                contenedorPremium.appendChild(card);
            });
        }

        buscador.addEventListener('input', renderarProductos);

        botonesFiltro.forEach(boton => {
            boton.addEventListener('click', (e) => {
                botonesFiltro.forEach(b => b.classList.remove('activo'));
                e.target.classList.add('activo');
                filtroMarcaActivo = e.target.getAttribute('data-filtro');
                renderarProductos();
            });
        });

        const modalVip = document.getElementById('modal-premium');
        const btnAbrirVip = document.getElementById('abrir-vip');
        const btnCerrarVip = document.getElementById('cerrar-vip');

        btnAbrirVip.addEventListener('click', () => {
            renderarPremium();
            modalVip.classList.add('activo');
