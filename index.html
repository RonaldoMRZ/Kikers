<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sneaker Store | Catálogo Completo</title>
    <style>
        :root {
            --bg-principal: #0b0b0d;
            --bg-tarjeta: #16161a;
            --acento: #ff5e00; 
            --texto-blanco: #ffffff;
            --texto-gris: #94a3b8;
            --whatsapp-color: #25d366;
            --borde: #27272a;
            --oro-premium: #ffd700;
            --bg-premium: #0f0f12;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-principal);
            color: var(--texto-blanco);
            padding-bottom: 40px;
            overflow-x: hidden;
        }

        header {
            text-align: center;
            padding: 30px 20px 15px 20px;
            background: linear-gradient(180deg, rgba(255, 94, 0, 0.12) 0%, rgba(11, 11, 13, 0) 100%);
            position: relative;
        }

        header h1 {
            font-size: 2.3rem;
            font-weight: 800;
            letter-spacing: -1px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        header h1 span {
            color: var(--acento);
        }

        /* 🔥 BOTÓN PREMIUM ARRIBA A LA DERECHA */
        .btn-premium-top {
            position: absolute;
            top: 50%;
            right: 30px;
            transform: translateY(-50%);
            background: linear-gradient(135deg, #ffe600 0%, #ff5e00 100%);
            color: #000000;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: 800;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255, 94, 0, 0.4);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-premium-top:hover {
            transform: translateY(-50%) scale(1.05);
            box-shadow: 0 0 25px rgba(255, 230, 0, 0.7);
        }

        /* =======================================================
           🔥 SECCIÓN DE REVELADO ESTILO ROCKSTAR / GTA 6 
           ======================================================= */
        .seccion-revelado {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 75vh;
            background: radial-gradient(circle at center, #131317 0%, var(--bg-principal) 100%);
            overflow: hidden;
            padding: 40px 20px;
            border-bottom: 1px solid var(--borde);
            margin-bottom: 35px;
        }

        .contenedor-animado {
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        .tenis-gta {
            width: 100%;
            max-width: 380px;
            height: auto;
            opacity: 0;
            filter: drop-shadow(0px 20px 45px rgba(255, 94, 0, 0.25));
            transform: translateY(110px) scale(0.6) rotate(-22deg);
            transition: all 1.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .tenis-gta.aparecer {
            opacity: 1;
            transform: translateY(0) scale(1) rotate(-8deg);
        }

        .texto-revelado {
            margin-top: 25px;
            opacity: 0;
            transform: translateY(30px);
            transition: all 1s cubic-bezier(0.16, 1, 0.3, 1) 0.3s;
        }

        .texto-revelado.aparecer {
            opacity: 1;
            transform: translateY(0);
        }

        .texto-revelado h2 {
            font-size: 1.8rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .texto-revelado p {
            color: var(--acento);
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* =======================================================
           💎 NUEVA CATEGORÍA EXCLUSIVA PREMIUM (MODAL VIP)
           ======================================================= */
        .modal-vip {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(4, 4, 6, 0.92);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        .modal-vip.activo {
            opacity: 1;
            pointer-events: auto;
        }

        .contenido-vip {
            width: 92%;
            max-width: 1100px;
            height: 85vh;
            background-color: var(--bg-premium);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 24px;
            padding: 35px 25px;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 0 60px rgba(255, 215, 0, 0.08);
            transform: translateY(60px) scale(0.95);
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .modal-vip.activo .contenido-vip {
            transform: translateY(0) scale(1);
        }

        .btn-cerrar-vip {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: var(--texto-gris);
            font-size: 2rem;
            cursor: pointer;
            transition: color 0.2s;
        }

        .btn-cerrar-vip:hover {
            color: var(--oro-premium);
        }

        .encabezado-vip {
            text-align: center;
            margin-bottom: 35px;
        }

        .encabezado-vip h2 {
            font-size: 2.2rem;
            font-weight: 900;
            letter-spacing: 2px;
            background: linear-gradient(90deg, #fff 0%, var(--oro-premium) 50%, #fff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .encabezado-vip p {
            color: var(--texto-gris);
            font-size: 0.95rem;
        }

        .grid-premium {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        /* Tarjetas de lujo con animación de entrada y brillo */
        .tarjeta-premium {
            background: linear-gradient(145deg, #1a1a22, #111115);
            border-radius: 20px;
            border: 1px solid rgba(255, 215, 0, 0.1);
            padding: 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
            opacity: 0;
            transform: translateY(40px);
            transition: all 0.4s ease;
        }

        /* Animación escalonada al abrir el contenedor VIP */
        .modal-vip.activo .tarjeta-premium {
            opacity: 1;
            transform: translateY(0);
        }

        .tarjeta-premium:hover {
            border-color: var(--oro-premium);
            transform: translateY(-6px) scale(1.02);
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.12);
        }

        .tarjeta-premium .img-vip-container {
            width: 100%;
            height: 200px;
            background: radial-gradient(circle, #22222b 0%, #111115 100%);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            overflow: hidden;
        }

        .tarjeta-premium .img-vip-container img {
            width: 85%;
            height: 85%;
            object-fit: contain;
            transition: transform 0.5s ease;
        }

        .tarjeta-premium:hover .img-vip-container img {
            transform: scale(1.1) rotate(4deg); /* El tenis flota y gira un poco al pasar el dedo */
        }

        .badge-vip {
            position: absolute;
            top: 15px;
            left: 15px;
            background: linear-gradient(90deg, #000, #b59410);
            border: 1px solid var(--oro-premium);
            color: var(--oro-premium);
            font-size: 0.7rem;
            font-weight: 800;
            padding: 5px 10px;
            border-radius: 6px;
            text-transform: uppercase;
        }

        .tarjeta-premium .precio-vip {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--oro-premium);
            margin: 12px 0;
        }

        .btn-pedido-vip {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            background: linear-gradient(90deg, #b59410, #ffe600);
            color: #000;
            text-decoration: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: 800;
            font-size: 0.9rem;
            text-transform: uppercase;
            transition: opacity 0.2s;
        }

        .btn-pedido-vip:hover {
            opacity: 0.9;
        }

        /* ======================================================= */

        .seccion-filtros {
            max-width: 600px;
            margin: 0 auto 30px auto;
            padding: 0 20px;
        }

        .caja-busqueda {
            width: 100%;
            padding: 14px 20px;
            background-color: var(--bg-tarjeta);
            border: 1px solid var(--borde);
            border-radius: 12px;
            color: var(--texto-blanco);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
            margin-bottom: 15px;
        }

        .caja-busqueda:focus {
            border-color: var(--acento);
        }

        .grupo-botones {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 5px;
            scrollbar-width: none;
        }

        .grupo-botones::-webkit-scrollbar {
            display: none;
        }

        .btn-filtro {
            background-color: var(--bg-tarjeta);
            color: var(--texto-gris);
            border: 1px solid var(--borde);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .btn-filtro.activo, .btn-filtro:hover {
            background-color: var(--acento);
            color: var(--texto-blanco);
            border-color: var(--acento);
        }

        .contenedor-catalogo {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }

        .tarjeta-tenis {
            background-color: var(--bg-tarjeta);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--borde);
            transition: transform 0.2s, border-color 0.2s;
        }

        .tarjeta-tenis:hover {
            transform: translateY(-4px);
            border-color: var(--acento);
        }

        .imagen-contenedor {
            width: 100%;
            height: 240px;
            background-color: #1f1f24;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .imagen-contenedor img {
            width: 90%;
            height: 90%;
            object-fit: contain;
        }

        .etiqueta-calidad {
            position: absolute;
            top: 12px;
            left: 12px;
            background-color: var(--acento);
            color: white;
            font-size: 0.75rem;
            font-weight: 700;
            padding: 4px 8px;
            border-radius: 6px;
            text-transform: uppercase;
        }

        .detalles-producto {
            padding: 20px;
        }

        .marca {
            font-size: 0.8rem;
            text-transform: uppercase;
            color: var(--texto-gris);
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .nombre-modelo {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 8px;
            line-height: 1.3;
            height: 2.6em;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .precio {
            font-size: 1.4rem;
            font-weight: 800;
            margin-bottom: 16px;
        }

        .btn-pedido {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            background-color: var(--whatsapp-color);
            color: white;
            text-decoration: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 0.95rem;
        }

        .btn-pedido svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        .info-entregas {
            text-align: center;
            margin-top: 40px;
            color: var(--texto-gris);
            font-size: 0.85rem;
        }

        /* Ajuste Responsivo para móviles */
        @media (max-width: 580px) {
            header {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 15px;
                padding-top: 25px;
            }

                position: static;
sition: static;
